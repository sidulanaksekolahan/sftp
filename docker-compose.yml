services:
  postgres:
    image: postgres:16-alpine3.22
    container_name: postgres-sftp
    ports:
      - "5438:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres16-data:/var/lib/postgresql/data

  springboot:
    image: mirfanduri/sftp:v1.0.0
    ports:
      - "8081:8081"
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - EMAIL=${EMAIL:mirfan.duri@gmail.com}
      - PASSWORD_EMAIL=${PASSWORD_EMAIL:password}
    depends_on:
      - postgres

volumes:
  postgres16-data:

